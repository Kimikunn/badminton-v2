services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DIR: dist-test
    container_name: badminton-v2-test
    restart: unless-stopped
    ports:
      - "8090:3000"
    volumes:
      - ./server/database:/app/server/database
      - ./server/uploads:/app/server/uploads
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/server/database/test.db
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ENABLE_TEST_FEATURES=true
